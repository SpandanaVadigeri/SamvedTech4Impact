    <!-- Hard Hat -->
    <path d="M30 35 L70 35 L75 45 L25 45 L30 35Z" fill="#f39c12"/>
    <rect x="35" y="40" width="30" height="10" fill="#e67e22"/>
    
    <!-- Face Circle -->
    <circle cx="50" cy="60" r="20" fill="#ecf0f1"/>
    
    <!-- Eyes -->
    <circle cx="40" cy="60" r="3" fill="#2c3e50"/>
