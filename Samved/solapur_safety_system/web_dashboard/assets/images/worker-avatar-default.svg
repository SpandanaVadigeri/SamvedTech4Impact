    <!-- Safety Glasses -->
    <rect x="35" y="55" width="30" height="5" fill="#3498db" fill-opacity="0.5"/>
    
    <!-- Vest -->
    <rect x="35" y="75" width="30" height="15" fill="#f39c12" rx="3"/>
